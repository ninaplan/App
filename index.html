<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f8f8f8">
<title>경제금융용어 800선</title>
<style>
/* ── 리셋·기반 ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:18px}
body{
  font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
  background:#f8f8f8;color:#222;
  height:100dvh;overflow:hidden;
  -webkit-font-smoothing:antialiased
}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit}

/* ── CSS 변수 ── */
:root{
  --bg:#f8f8f8;--card:#fff;
  --gray1:#e8e8e8;--gray2:#cccccc;--gray3:#aaaaaa;
  --gray4:#888888;--gray5:#555555;--gray6:#222;--black:#111;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --tab-h:64px
}

/* ── 레이아웃 ── */
#app{display:flex;flex-direction:column;height:100dvh}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll-area::-webkit-scrollbar{display:none}

/* ── 탭바 ── */
.tabbar{
  display:flex;background:#fff;
  border-top:1px solid var(--gray2);
  padding-bottom:var(--safe-b);
  flex-shrink:0;height:calc(var(--tab-h) + var(--safe-b))
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  padding:8px 4px;
  color:var(--gray4);font-size:12px;font-weight:600;
  transition:color .15s
}
.tab-btn.on{color:var(--black)}
.tab-icon{width:24px;height:24px;flex-shrink:0}
.tab-icon svg{width:100%;height:100%;stroke-width:1.8;fill:none;stroke:currentColor}

/* ── 상단바 ── */
.topbar{
  background:#fff;border-bottom:1px solid var(--gray2);
  padding:calc(14px + var(--safe-t)) 18px 14px;
  flex-shrink:0;text-align:center
}
.topbar-title{font-size:20px;font-weight:800;color:var(--black);letter-spacing:-.5px}
.topbar-sub{font-size:12px;color:var(--gray4);margin-top:3px}

/* ════════════════════════════
   학습 탭
════════════════════════════ */
.learn-inner{padding:16px 16px calc(24px + var(--safe-b))}

/* 설정 카드 */
.setting-card{
  background:#fff;border-radius:16px;border:1px solid var(--gray2);
  padding:18px;margin-bottom:14px
}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.setting-row:last-child{margin-bottom:0}
.setting-label{font-size:16px;font-weight:700;color:var(--gray6)}
.setting-sub{font-size:13px;color:var(--gray4);margin-top:2px}
.seg-ctrl{display:flex;background:var(--gray1);border-radius:10px;padding:3px;gap:2px}
.seg-btn{
  flex:1;padding:8px 4px;border-radius:8px;
  font-size:13px;font-weight:600;color:var(--gray5);
  transition:all .15s;white-space:nowrap
}
.seg-btn.on{background:#fff;color:var(--black);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.days-input-row{display:flex;align-items:center;gap:10px}
.days-input{
  width:72px;padding:8px 12px;border:1.5px solid var(--gray2);
  border-radius:10px;font-size:18px;font-weight:700;text-align:center;
  color:var(--black);outline:none
}
.days-input:focus{border-color:var(--gray5)}
.days-label{font-size:15px;color:var(--gray5)}

/* 오늘 학습 카드 */
.today-card{
  background:#fff;border-radius:16px;border:1px solid var(--gray2);
  padding:20px 18px;margin-bottom:14px
}
.today-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.today-title{font-size:18px;font-weight:800;color:var(--black)}
.today-progress{font-size:14px;color:var(--gray4)}
.progress-bar{height:6px;background:var(--gray1);border-radius:99px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:var(--gray5);border-radius:99px;transition:width .4s}

/* 용어 학습 아이템 */
.term-item{
  border:1px solid var(--gray2);border-radius:14px;
  padding:18px;margin-bottom:10px;background:#fff;
  cursor:pointer;transition:border-color .15s
}
.term-item.studied{border-color:var(--gray5);background:var(--gray1);opacity:.75}
.term-item-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:0}
.term-name{font-size:18px;font-weight:800;color:var(--black);flex:1;word-break:break-word}
.term-cat{font-size:12px;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:3px;font-weight:600}
.cat-거시경제{background:#e8e8e8;color:#444}
.cat-금융시장{background:#dde8f0;color:#2d5a7a}
.cat-통화정책{background:#e0dff0;color:#4a3d8a}
.cat-금융안정{background:#f0e0de;color:#8a3d3a}
.cat-국제경제{background:#dff0e4;color:#2d6b45}
.cat-금융제도{background:#f0ece0;color:#7a6020}
.cat-지급결제{background:#e8f0e0;color:#4a6a2a}
.cat-재정{background:#f0e8e0;color:#7a4a20}
.cat-기타{background:#e8e8e8;color:#555}
.term-def{
  font-size:17px;line-height:1.8;color:var(--gray6);
  margin-top:12px;display:none;word-break:break-word
}
.term-def.open{display:block}
.term-def-line2{color:var(--gray5)}
.term-actions{display:flex;align-items:center;justify-content:space-between;margin-top:14px;display:none}
.term-actions.open{display:flex}
.dict-link-btn{
  font-size:14px;color:var(--gray5);border:1px solid var(--gray2);
  border-radius:8px;padding:7px 14px;font-weight:600
}
.dict-link-btn:active{background:var(--gray1)}
.studied-btn{
  font-size:14px;font-weight:700;
  border-radius:8px;padding:7px 16px;
  border:1.5px solid var(--gray3);color:var(--gray5)
}
.studied-btn.done{background:var(--gray6);color:#fff;border-color:var(--gray6);font-size:15px}
.studied-btn:active{opacity:.8}

/* 카테고리 선택 패널 */
.cat-select-panel{
  margin-top:12px;display:none;flex-wrap:wrap;gap:8px
}
.cat-select-panel.open{display:flex}
.cat-chip{
  padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;
  border:2px solid transparent;cursor:pointer;transition:all .15s;opacity:.6
}
.cat-chip.on{opacity:1;border-color:var(--black)}
.cat-chip:active{opacity:.8}
.done-banner{
  background:var(--gray6);color:#fff;border-radius:16px;
  padding:22px 20px;text-align:center;margin-bottom:14px
}
.done-banner-title{font-size:20px;font-weight:800;margin-bottom:6px}
.done-banner-sub{font-size:15px;opacity:.7}

/* ════════════════════════════
   퀴즈 탭
════════════════════════════ */
.quiz-inner{padding:16px 16px calc(24px + var(--safe-b))}

.quiz-setting-card{
  background:#fff;border-radius:16px;border:1px solid var(--gray2);
  padding:18px;margin-bottom:14px
}
.quiz-stat-row{display:flex;gap:10px;margin-bottom:14px}
.quiz-stat{
  flex:1;background:var(--gray1);border-radius:12px;
  padding:14px 12px;text-align:center
}
.quiz-stat-n{font-size:26px;font-weight:800;color:var(--black)}
.quiz-stat-l{font-size:12px;color:var(--gray4);margin-top:2px}

.start-quiz-btn{
  width:100%;padding:18px;border-radius:14px;
  background:var(--black);color:#fff;
  font-size:18px;font-weight:800;
  transition:opacity .15s
}
.start-quiz-btn:active{opacity:.75}
.start-quiz-btn:disabled{background:var(--gray3);cursor:default}

/* 퀴즈 진행 */
.quiz-progress-bar{height:4px;background:var(--gray1);flex-shrink:0}
.quiz-progress-fill{height:100%;background:var(--gray6);transition:width .3s}
.quiz-header{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:#fff;
  border-bottom:1px solid var(--gray2);flex-shrink:0
}
.quiz-cancel-btn{
  font-size:15px;font-weight:700;color:var(--gray5);
  padding:8px 14px;border:1.5px solid var(--gray2);border-radius:10px
}
.quiz-cancel-btn:active{background:var(--gray1)}
.quiz-step{flex:1;text-align:center;font-size:15px;font-weight:600;color:var(--gray5)}
.quiz-score{font-size:15px;font-weight:700;color:var(--black)}

.quiz-card{
  background:#fff;border-radius:16px;border:1px solid var(--gray2);
  padding:22px 20px;margin-bottom:14px
}
.quiz-type-badge{
  display:inline-block;font-size:12px;font-weight:700;
  color:var(--gray4);background:var(--gray1);
  padding:4px 12px;border-radius:20px;margin-bottom:14px
}
.quiz-question{font-size:20px;font-weight:800;line-height:1.5;color:var(--black);word-break:break-word}
.quiz-desc{font-size:17px;line-height:1.8;color:var(--gray6);margin-top:10px;word-break:break-word}

.choices{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.choice-btn{
  background:#fff;border:1.5px solid var(--gray2);border-radius:14px;
  padding:16px 18px;font-size:17px;color:var(--black);
  text-align:left;line-height:1.5;
  display:flex;align-items:center;gap:14px;
  transition:border-color .15s;word-break:break-word
}
.choice-btn:active:not([disabled]){background:var(--gray1)}
.choice-num{
  width:32px;height:32px;border-radius:50%;background:var(--gray1);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:var(--gray5);flex-shrink:0
}
.choice-btn.correct{background:#f0f7f0;border-color:#666}
.choice-btn.correct .choice-num{background:#444;color:#fff}
.choice-btn.wrong{background:#fdf0f0;border-color:#aaa}
.choice-btn.wrong .choice-num{background:#999;color:#fff}
.choice-btn.dim{opacity:.3}

.feedback-card{
  background:#fff;border:1.5px solid var(--gray2);border-radius:14px;
  padding:18px 20px;margin-bottom:14px;display:none
}
.feedback-card.open{display:block}
.feedback-result{font-size:18px;font-weight:800;margin-bottom:8px}
.feedback-result.ok{color:#333}
.feedback-result.ng{color:#888}
.feedback-answer{font-size:15px;color:var(--gray5);margin-bottom:10px;font-weight:600}
.feedback-def{font-size:16px;line-height:1.8;color:var(--gray6);word-break:break-word}

.next-btn{
  width:100%;padding:18px;border-radius:14px;
  background:var(--black);color:#fff;
  font-size:18px;font-weight:800;display:none;
  transition:opacity .15s
}
.next-btn.open{display:block}
.next-btn:active{opacity:.75}

/* 결과 */
.result-card{
  background:#fff;border-radius:16px;border:1px solid var(--gray2);
  padding:28px 20px;text-align:center;margin-bottom:14px
}
.result-score{font-size:56px;font-weight:900;letter-spacing:-3px;color:var(--black)}
.result-total{font-size:18px;color:var(--gray4);margin-bottom:4px}
.result-pct{font-size:15px;color:var(--gray4);margin-bottom:20px}
.result-stats{display:flex;gap:10px;margin-bottom:20px}
.result-stat{flex:1;background:var(--gray1);border-radius:12px;padding:14px 8px;text-align:center}
.result-stat-n{font-size:24px;font-weight:800;color:var(--black)}
.result-stat-l{font-size:12px;color:var(--gray4);margin-top:2px}
.result-btns{display:flex;gap:10px}
.result-btn{
  flex:1;padding:15px;border-radius:12px;
  font-size:16px;font-weight:700
}
.result-btn.pri{background:var(--black);color:#fff}
.result-btn.sec{background:var(--gray1);color:var(--black)}
.result-btn:active{opacity:.75}
.wrong-title{font-size:15px;font-weight:700;color:var(--gray5);margin:16px 0 10px}
.wrong-item{
  background:#fff;border:1px solid var(--gray2);border-radius:12px;
  padding:16px 18px;margin-bottom:8px
}
.wrong-term{font-size:17px;font-weight:800;color:var(--black);margin-bottom:6px}
.wrong-def{font-size:15px;line-height:1.7;color:var(--gray5);word-break:break-word}

/* ════════════════════════════
   사전 탭
════════════════════════════ */
.dict-layout{flex:1;display:flex;overflow:hidden;position:relative}

/* 목록 패널 */
.dict-list-panel{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  background:#fff
}
.search-bar{
  padding:10px 14px;border-bottom:1px solid var(--gray2);flex-shrink:0
}
.search-wrap{position:relative}
.search-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;pointer-events:none;color:var(--gray3)
}
.search-icon svg{width:100%;height:100%;stroke:currentColor;stroke-width:2;fill:none}
.search-input{
  width:100%;padding:13px 40px 13px 42px;
  background:var(--gray1);border:1.5px solid var(--gray1);
  border-radius:12px;font-size:18px;color:var(--black);
  outline:none;transition:border-color .2s
}
.search-input:focus{border-color:var(--gray3);background:#fff}
.search-input::placeholder{color:var(--gray3)}
.search-clear{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:22px;height:22px;border-radius:50%;background:var(--gray3);
  color:#fff;font-size:13px;font-weight:700;
  display:none;align-items:center;justify-content:center
}
.search-clear.on{display:flex}

/* 자음 탭 — 오른쪽 세로 */
.dict-content-area{flex:1;display:flex;overflow:hidden}
.term-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.term-list::-webkit-scrollbar{display:none}
.cons-sidebar{
  width:34px;background:var(--bg);border-left:1px solid var(--gray2);
  display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;flex-shrink:0;padding:4px 0
}
.cons-sidebar::-webkit-scrollbar{display:none}
.cons-btn{
  width:28px;height:28px;border-radius:6px;margin:2px 0;
  font-size:13px;font-weight:700;color:var(--gray4);
  display:flex;align-items:center;justify-content:center
}
.cons-btn.on{background:var(--gray6);color:#fff}
.cons-btn:active{background:var(--gray2)}

/* 용어 행 */
.group-header{
  padding:8px 16px 4px;font-size:12px;font-weight:800;
  color:var(--gray4);letter-spacing:.8px;background:var(--bg);
  position:sticky;top:0;z-index:1;border-bottom:1px solid var(--gray2)
}
.term-row{
  padding:16px 16px 14px;border-bottom:1px solid var(--gray2);
  background:#fff;cursor:pointer;transition:background .12s
}
.term-row:active{background:var(--gray1)}
.term-row-name{font-size:19px;font-weight:700;color:var(--black);margin-bottom:4px}
.term-row-preview{font-size:14px;color:var(--gray4);line-height:1.5;word-break:break-word}
mark{background:#e8e8e8;color:var(--black);border-radius:2px;padding:0 1px}
.no-result{padding:60px 20px;text-align:center;color:var(--gray3);font-size:17px}

/* 상세 패널 */
.dict-detail-panel{
  position:absolute;inset:0;background:#fff;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;z-index:10
}
.dict-detail-panel.open{transform:translateX(0)}
.detail-header{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-bottom:1px solid var(--gray2);flex-shrink:0;
  background:#fff
}
.back-btn{
  font-size:15px;font-weight:700;color:var(--gray6);
  padding:9px 16px;border:1.5px solid var(--gray2);border-radius:10px
}
.back-btn:active{background:var(--gray1)}
.detail-header-term{
  flex:1;font-size:17px;font-weight:700;color:var(--black);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 18px 60px}
.detail-scroll::-webkit-scrollbar{display:none}
.detail-term{font-size:28px;font-weight:900;color:var(--black);letter-spacing:-.5px;margin-bottom:20px;word-break:break-word}
.detail-section{margin-bottom:24px}
.detail-section-label{
  font-size:11px;font-weight:800;color:var(--gray3);
  letter-spacing:.8px;margin-bottom:10px
}
.detail-desc{font-size:17px;line-height:2.0;color:var(--gray6);word-break:break-word}
.detail-divider{height:1px;background:var(--gray2);margin:20px 0}

/* 데스크탑 */
@media(min-width:720px){
  html{font-size:16px}
  .dict-detail-panel{position:static;transform:none!important;border-left:1px solid var(--gray2);flex:1}
  .dict-list-panel{max-width:340px;flex:none}
  .dict-layout{background:#fff}
  .back-btn{display:none}
}

/* 로딩 */
.loading{display:flex;align-items:center;justify-content:center;height:100%;font-size:16px;color:var(--gray3)}
</style>
</head>
<body>
<div id="app">
  <!-- 학습 -->
  <div class="screen active" id="scr-learn">
    <div class="topbar">
      <div class="topbar-title">갱디's 경제금융용어</div>
      <div class="topbar-sub">한국은행 경제교육실 2026</div>
    </div>
    <div class="scroll-area"><div class="learn-inner" id="learn-inner"><div class="loading">데이터 로딩 중...</div></div></div>
  </div>

  <!-- 퀴즈 -->
  <div class="screen" id="scr-quiz">
    <div id="quiz-header-wrap"></div>
    <div class="scroll-area"><div class="quiz-inner" id="quiz-inner"><div class="loading">데이터 로딩 중...</div></div></div>
  </div>

  <!-- 사전 -->
  <div class="screen" id="scr-dict">
    <!-- 목록 뷰 -->
    <div id="dict-list-view" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="topbar">
        <div class="topbar-title">용어사전</div>
        <div class="topbar-sub">출처: 경제금융용어 800선</div>
      </div>
      <div class="search-bar">
        <div class="search-wrap">
          <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
          <input class="search-input" id="search-input" type="search" placeholder="용어 검색..." autocomplete="off">
          <button class="search-clear" id="search-clear">✕</button>
        </div>
      </div>
      <div class="dict-content-area" style="flex:1;display:flex;overflow:hidden">
        <div class="term-list" id="term-list"><div class="loading">데이터 로딩 중...</div></div>
        <div class="cons-sidebar" id="cons-sidebar"></div>
      </div>
    </div>
    <!-- 상세 뷰 — 전체 화면 전환 -->
    <div id="dict-detail-view" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="detail-header">
        <button class="back-btn" id="back-btn">← 목록</button>
        <div class="detail-header-term" id="detail-header-term"></div>
      </div>
      <div class="detail-scroll" id="detail-scroll"></div>
    </div>
  </div>

  <!-- 탭바 -->
  <nav class="tabbar">
    <button class="tab-btn on" data-tab="learn" id="tab-learn">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>
      <span>학습</span>
    </button>
    <button class="tab-btn" data-tab="quiz" id="tab-quiz">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg></span>
      <span>퀴즈</span>
    </button>
    <button class="tab-btn" data-tab="dict" id="tab-dict">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
      <span>사전</span>
    </button>
  </nav>
</div>

<script>
// ═══════════════════════════════════════════
// 전역 상태
// ═══════════════════════════════════════════
let DATA = [];          // data.json 전체
let STUDY_DATA = [];    // 전체 용어
let TMAP = {};          // term → index

// localStorage 키
const LS = {
  progress: 'ef_progress',   // {term: true} 학습 완료
  settings: 'ef_settings',   // {days, order, quizMode}
  wrongTerms: 'ef_wrong',    // {term: true} 틀린 문제
  quizState: 'ef_quiz',      // 퀴즈 진행 상태
};

function lsGet(k){ try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v))}catch{} }

// ═══════════════════════════════════════════
// 데이터 로드
// ═══════════════════════════════════════════
async function loadData(){
  const res = await fetch('./data.json');
  DATA = await res.json();
  DATA.forEach((t,i)=>{ TMAP[t.term]=i; });
  STUDY_DATA = DATA; // 전체 789개 사용
  initAll();
}

// 탭 전환
// ═══════════════════════════════════════════
function goTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('scr-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('on');
  if(tab==='dict' && !dictInited) initDict();
}
document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>goTab(b.dataset.tab));
});

// ═══════════════════════════════════════════
// 설정 로드/저장
// ═══════════════════════════════════════════
function getSettings(){
  return Object.assign({days:30, order:'freq', quizMode:'all', selectedCat:'all'}, lsGet(LS.settings)||{});
}
function saveSettings(s){ lsSet(LS.settings, s); }
function getProgress(){ return lsGet(LS.progress)||{}; }
function markStudied(term){
  const p=getProgress(); p[term]=true; lsSet(LS.progress,p);
}
function unmarkStudied(term){
  const p=getProgress(); delete p[term]; lsSet(LS.progress,p);
}

// ═══════════════════════════════════════════
// 커리큘럼 계산
// ═══════════════════════════════════════════
function getOrderedTerms(order){
  const s = getSettings();
  let terms = [...STUDY_DATA];
  if(order==='cat' && s.selectedCat && s.selectedCat!=='all'){
    terms = terms.filter(t=>t.cat===s.selectedCat);
  }
  if(order==='freq') return terms.sort((a,b)=>a.freq-b.freq||a.term.localeCompare(b.term,'ko'));
  if(order==='alpha') return terms.sort((a,b)=>a.term.localeCompare(b.term,'ko'));
  if(order==='cat'){
    const catOrder = ['거시경제','금융시장','통화정책','금융안정','국제경제','금융제도','지급결제','재정','기타'];
    return terms.sort((a,b)=>{
      const ai=catOrder.indexOf(a.cat), bi=catOrder.indexOf(b.cat);
      return (ai<0?99:ai)-(bi<0?99:bi)||a.freq-b.freq;
    });
  }
  return terms;
}

function getCurriculum(days, order){
  const terms = getOrderedTerms(order);
  const perDay = Math.ceil(terms.length/days);
  const curriculum = [];
  for(let i=0;i<days;i++){
    const slice = terms.slice(i*perDay,(i+1)*perDay);
    if(slice.length) curriculum.push({day:i+1, terms:slice});
  }
  return curriculum;
}

function getTodayDayIdx(curriculum){
  const p = getProgress();
  // 마지막으로 공부 중이거나 해야 할 day
  for(let i=0;i<curriculum.length;i++){
    const allDone = curriculum[i].terms.every(t=>p[t.term]);
    if(!allDone) return i;
  }
  return curriculum.length-1;
}

function idx(term){ return term.replace(/[^가-힣a-zA-Z0-9]/g,'_'); }
function esc(s){ return s.replace(/"/g,'&quot;'); }

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function maskTerm(text, term){
  if(!text||!term) return text||'';
  let t = term.split('(')[0].trim();
  return text.split(t).join('___').split(term).join('___');
}

function makeQuestion(t, pool, type){
  const wrong3 = shuffle(pool.filter(x=>x.term!==t.term)).slice(0,3);
  if(type==='term2def'){
    // 용어 보여주고 뜻 맞추기 — 선택지: 요약 정의 첫 줄
    const correct = t.def.split('\n')[0];
    const choices = shuffle([correct, ...wrong3.map(w=>w.def.split('\n')[0])]);
    return {type:'term2def', term:t.term, question:t.term, hint:'이 용어의 뜻은?', choices, answer:correct, fullDef:t.def};
  } else {
    // 뜻 보여주고 용어 맞추기 — 마스킹 처리
    const maskedDef = maskTerm(t.def.split('\n')[0], t.term);
    const choices = shuffle([t.term, ...wrong3.map(w=>w.term)]);
    return {type:'def2term', term:t.term, question:maskedDef, hint:'이 설명에 해당하는 용어는?', choices, answer:t.term, fullDef:t.def};
  }
}

function startQuiz(){
  const s = getSettings();
  const p = getProgress();
  const wrongMap = lsGet(LS.wrongTerms)||{};

  let pool;
  if(s.quizMode==='studied') pool = STUDY_DATA.filter(t=>p[t.term]);
  else if(s.quizMode==='wrong') pool = STUDY_DATA.filter(t=>wrongMap[t.term]);
  else pool = [...STUDY_DATA];

  pool = shuffle(pool);
  const questions = pool.map((t,i)=>makeQuestion(t, pool, i%2===0?'term2def':'def2term'));
  QS = {questions, cur:0, score:0, wrong:[], answered:false};
  renderQuizQ();
}

function renderQuizHeader(){
  const q=QS.questions, c=QS.cur;
  document.getElementById('quiz-header-wrap').innerHTML=`
    <div class="quiz-header">
      <button class="quiz-cancel-btn" id="quiz-cancel">취소</button>
      <div class="quiz-step">${c+1} / ${q.length}</div>
      <div class="quiz-score">맞음 ${QS.score}</div>
    </div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${c/q.length*100}%"></div></div>
  `;
  document.getElementById('quiz-cancel').addEventListener('click',()=>{if(confirm('퀴즈를 중단할까요?'))renderQuizHome();});
}

function renderQuizQ(){
  const q = QS.questions[QS.cur];
  renderQuizHeader();
  const nums=['①','②','③','④'];
  document.getElementById('quiz-inner').innerHTML=`
    <div class="quiz-card">
      <div class="quiz-type-badge">${q.type==='term2def'?'용어 → 뜻 맞추기':'뜻 → 용어 맞추기'}</div>
      <div class="quiz-question">${q.question}</div>
      ${q.hint?`<div class="quiz-desc">${q.hint}</div>`:''}
    </div>
    <div class="choices" id="choices">
      ${q.choices.map((c,i)=>`
        <button class="choice-btn" data-choice="${esc(c)}">
          <span class="choice-num">${nums[i]}</span>
          <span>${c}</span>
        </button>`).join('')}
    </div>
    <div class="feedback-card" id="feedback"></div>
    <button class="next-btn" id="next-btn">${QS.cur+1<QS.questions.length?'다음 문제 →':'결과 보기 →'}</button>
  `;
  QS.answered = false;
  document.getElementById('quiz-inner').parentElement.scrollTop=0;

  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.addEventListener('click',()=>pickAnswer(b.dataset.choice));
  });
  document.getElementById('next-btn').addEventListener('click', nextQ);
}

function pickAnswer(choice){
  if(QS.answered) return;
  QS.answered=true;
  const q=QS.questions[QS.cur];
  const ok=(choice===q.answer);
  if(ok) QS.score++;
  else {
    QS.wrong.push(q);
    // 틀린 문제 저장
    const wrongMap = lsGet(LS.wrongTerms)||{};
    wrongMap[q.term] = true;
    lsSet(LS.wrongTerms, wrongMap);
  }

  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.choice===q.answer) b.classList.add('correct');
    else if(b.dataset.choice===choice) b.classList.add('wrong');
    else b.classList.add('dim');
  });

  const fb=document.getElementById('feedback');
  fb.classList.add('open');
  fb.innerHTML=`
    <div class="feedback-result ${ok?'ok':'ng'}">${ok?'정답':'오답'}</div>
    <div class="feedback-answer">정답: ${q.term}</div>
    <div class="feedback-def">${q.fullDef.split('\n').join('<br>')}</div>
  `;
  document.getElementById('next-btn').classList.add('open');
  renderQuizHeader();
}

function nextQ(){
  QS.cur++;
  if(QS.cur>=QS.questions.length) renderQuizResult();
  else renderQuizQ();
}

function renderQuizResult(){
  document.getElementById('quiz-header-wrap').innerHTML='';
  const total=QS.questions.length, score=QS.score;
  const pct=Math.round(score/total*100);
  document.getElementById('quiz-inner').innerHTML=`
    <div class="result-card">
      <div class="result-total">${score} / ${total}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-pct">정답률</div>
      <div class="result-stats">
        <div class="result-stat"><div class="result-stat-n">${score}</div><div class="result-stat-l">정답</div></div>
        <div class="result-stat"><div class="result-stat-n">${total-score}</div><div class="result-stat-l">오답</div></div>
      </div>
      <div class="result-btns">
        <button class="result-btn sec" id="res-home">홈으로</button>
        <button class="result-btn pri" id="res-retry">다시 풀기</button>
      </div>
    </div>
    ${QS.wrong.length?`
      <div class="wrong-title" style="display:flex;align-items:center;justify-content:space-between">
        <span>틀린 용어 (${QS.wrong.length}개)</span>
        <button id="clear-wrong" style="font-size:12px;color:var(--gray4);border:1px solid var(--gray2);border-radius:8px;padding:4px 10px;font-weight:600">초기화</button>
      </div>
      ${QS.wrong.map(q=>`
        <div class="wrong-item">
          <div class="wrong-term">${q.term}</div>
          <div class="wrong-def">${q.fullDef}</div>
        </div>`).join('')}
    `:''}
  `;
  document.getElementById('res-home').addEventListener('click', renderQuizHome);
  document.getElementById('res-retry').addEventListener('click', startQuiz);
  const clearBtn = document.getElementById('clear-wrong');
  if(clearBtn) clearBtn.addEventListener('click',()=>{
    lsSet(LS.wrongTerms,{});
    renderQuizHome();
  });
}

let dictInited=false, curCons='all', curSearch='', curDetailTerm='';

const CONS_LIST = ['all','ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ','A'];
const CONS_LABEL = {all:'전',A:'영'};

function initDict(){
  dictInited=true;
  // 자음 사이드바
  const sb=document.getElementById('cons-sidebar');
  sb.innerHTML=CONS_LIST.map(c=>`
    <button class="cons-btn${c==='all'?' on':''}" data-c="${c}">${CONS_LABEL[c]||c}</button>`).join('');
  sb.addEventListener('click',e=>{
    const b=e.target.closest('.cons-btn'); if(!b) return;
    curCons=b.dataset.c;
    document.querySelectorAll('.cons-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    curSearch=''; document.getElementById('search-input').value='';
    document.getElementById('search-clear').classList.remove('on');
    renderTermList();
    document.getElementById('term-list').scrollTop=0;
  });

  // 검색
  const si=document.getElementById('search-input');
  const sc=document.getElementById('search-clear');
  si.addEventListener('input',()=>{
    curSearch=si.value.trim();
    sc.classList.toggle('on',!!curSearch);
    if(curSearch){ curCons='all'; document.querySelectorAll('.cons-btn').forEach(b=>b.classList.toggle('on',b.dataset.c==='all')); }
    renderTermList();
  });
  sc.addEventListener('click',()=>{ si.value=''; curSearch=''; sc.classList.remove('on'); renderTermList(); });

  // 목록 클릭
  document.getElementById('term-list').addEventListener('click',e=>{
    const r=e.target.closest('.term-row'); if(!r) return;
    openDetail(r.dataset.term);
  });

  // 뒤로가기
  document.getElementById('back-btn').addEventListener('click', closeDetail);

  // 스와이프 뒤로가기
  let touchX=0;
  const dv=document.getElementById('dict-detail-view');
  dv.addEventListener('touchstart',e=>{ touchX=e.touches[0].clientX; },{passive:true});
  dv.addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientX - touchX > 60) closeDetail();
  },{passive:true});

  renderTermList();
}

function filteredTerms(){
  let list=DATA;
  if(curCons!=='all') list=list.filter(t=>t.consonant===curCons);
  if(curSearch){
    const q=curSearch.toLowerCase();
    list=list.filter(t=>t.term.toLowerCase().includes(q)||(t.desc||'').toLowerCase().includes(q));
  }
  return list;
}

function hlText(s){
  if(!curSearch||!s) return s||'';
  const q=curSearch.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return s.replace(new RegExp(q,'gi'),m=>`<mark>${m}</mark>`);
}

function renderTermList(){
  const list=filteredTerms();
  const el=document.getElementById('term-list');
  if(!list.length){ el.innerHTML='<div class="no-result">검색 결과 없음</div>'; return; }
  const showGroup=!curSearch&&curCons==='all';
  let html='', lastC='';
  list.forEach(t=>{
    if(showGroup&&t.consonant!==lastC){
      html+=`<div class="group-header">${t.consonant==='A'?'영문':t.consonant}</div>`;
      lastC=t.consonant;
    }
    const preview=(t.desc||'').slice(0,60).replace(/\n/g,' ');
    html+=`<div class="term-row" data-term="${esc(t.term)}">
      <div class="term-row-name">${hlText(t.term)}</div>
      <div class="term-row-preview">${hlText(preview)}${(t.desc||'').length>60?'…':''}</div>
    </div>`;
  });
  el.innerHTML=html;
}

function openDetail(term){
  const t=DATA[TMAP[term]]; if(!t) return;
  curDetailTerm=term;
  document.getElementById('detail-header-term').textContent=term;
  const ds=document.getElementById('detail-scroll');
  const desc=(t.desc||'').replace(/\n/g,'<br>');
  ds.innerHTML=`
    <div class="detail-term">${t.term}</div>
    <div class="detail-desc">${desc}</div>
  `;
  ds.scrollTop=0;
  // 목록 숨기고 상세 표시
  document.getElementById('dict-list-view').style.display='none';
  document.getElementById('dict-detail-view').style.display='flex';
  history.pushState({detail:term},'');
}

function closeDetail(){
  document.getElementById('dict-detail-view').style.display='none';
  document.getElementById('dict-list-view').style.display='flex';
  curDetailTerm='';
}

window.addEventListener('popstate',()=>{
  if(document.getElementById('dict-detail-view').style.display==='flex') closeDetail();
});

});
